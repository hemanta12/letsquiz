version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: letsquiz-redis
    profiles:
      - optional-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --save 60 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  redis_data:
    driver: local
